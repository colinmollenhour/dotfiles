# Colin's .tmux.conf ($INSTALL_REPO_HEAD)
# Installed on $INSTALL_DATE
# https://github.com/colinmollenhour/dotfiles

# Prefix: C-a
# Navigation:
#  c      create new window
#  <1-9>  switch window
#  d      detach from session
#  arrows switch to pane
#  C-a    switch to last used pane
#  C-q    send C-a for apps that conflcit with the prefix
#  n      next window
#  p      previous window
#  |      horizontal split
#  -      vertical split
#  I      refresh config
#  C-r    respawn after exit or disconnect (zombie)
#  C-k    kill after exit or disconnect (zombie)
#  "      choose-window
#  C-f    show lazy-tmux session finder
#  j      join pane to the specified window
#  z      toggle full-screen
# Other shortcuts and tools:
#  C-l    clear all panes in window (Ctrl+L)
#  s      synchronize panes (keyboard input)
#  C-c    botctl popup
#  C-g    lazygit popup
#  C-s    lazy-tmux save


unbind C-b
set-option -g prefix C-a
bind C-q send C-a
bind-key C-a last-pane
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v
bind C-r respawn-window
bind C-k kill-window
bind '"' choose-window
bind-key J command-prompt -p "send pane to (vertical):"  "join-pane -v -t '%%'"
bind-key j command-prompt -p "send pane to (horizontal):"  "join-pane -h -t '%%'"
bind C-l run-shell "tmux list-panes -F '##{pane_id}' | xargs -I{} tmux send-keys -t {} C-l"
bind z resize-pane -Z
bind s set-window-option synchronize-panes

#### Popups

# https://github.com/nielsgroen/claude-tmux
#bind-key C-c display-popup -E -w 80% -h 40 botctl dashboard --persistent
bind-key C-c run-shell -b 'client_height=#{client_height}; percent=60; [ "$client_height" -lt 40 ] && percent=90; height=$((client_height * percent / 100)); max=$((client_height - 2)); [ "$height" -gt "$max" ] && height="$max"; [ "$height" -lt 1 ] && height=1; tmux display-popup -E -w 80% -h "$height" "botctl dashboard --persistent"'
bind-key C-g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

#### Settings

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50

# Used by Pi Agent
set -g extended-keys on
set -g extended-keys-format csi-u

# Colin's "theme"
#set -g base-index 1
#set -g status-bg black
#set -g status-fg white
#set -g status-left-length 20
#set -g status-left '#[fg=green][#[fg=red]#S#[fg=green]]#[default]'
#set -g status-right-length 50
#set -g status-right '#[fg=green]#H:#(getip)  #[fg=yellow]%m/%d %H:%M:%S#[default]'

set-option -g status-keys vi
set-option -g bell-action any
set-option -g set-titles on
set-option -g set-titles-string '#T' # use terminal title only
set-option -g visual-bell off
set-option -g mouse on

setw -g mode-keys vi
setw -g monitor-activity on

# OneDark Theme (https://github.com/odedlaz/tmux-onedark-theme)
#run-shell ~/.config/tmux/tmux-onedark-theme.tmux

#### Plugins

# https://github.com/o0th/tmux-nova
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'erikw/tmux-powerline'

# lazy-tmux (https://lazy-tmux.xyz/configuration)
run-shell -b 'lazy-tmux daemon --scrollback >/tmp/lazy-tmux.log 2>&1 || tmux display-message "lazy-tmux daemon already running"'
bind-key f display-popup -w 75% -h 85% -E 'lazy-tmux picker'
bind-key C-s run-shell 'lazy-tmux save --all --scrollback && tmux display-message "All sessions saved successfully!"'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

############################################
# --- Dracula Hex Colors with green and red dots for activity and bells ---
# Gray (BG): #44475a
# Dark Purple (Current BG): #6272a4
# White (FG): #f8f8f2
# Green (Activity): #50fa7b
# Red (Bell): #ff5555

# Format for the current (active) window
set-window-option -g window-status-current-format "#[fg=#44475a,bg=#6272a4]#[fg=#f8f8f2,bg=#6272a4] #I #W#{?window_bell_flag,#[fg=#ff5555] ●,#{?window_activity_flag,#[fg=#50fa7b] ●,}} #[fg=#6272a4,bg=#44475a]"

# Format for all other windows
set-window-option -g window-status-format "#[fg=#f8f8f2,bg=#44475a] #I #W#{?window_bell_flag,#[fg=#ff5555] ●,#{?window_activity_flag,#[fg=#50fa7b] ●,}} "

# Required settings for these to trigger
set-option -g monitor-activity on
set-option -g visual-activity off

# Pane borders
set -g pane-border-lines single
set -g pane-border-style 'fg=colour52'
set -g pane-active-border-style 'fg=colour136'

